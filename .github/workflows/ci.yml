name: CI

on:
  push:
    branches: [main]
  pull_request:

# Each job builds its package only once that package exists, so CI is green
# during the planning phase and does real work as soon as code lands.
jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect backend project
        id: detect
        run: |
          if [ -f backend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No backend/package.json yet — nothing to build."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install and verify
        if: steps.detect.outputs.exists == 'true'
        working-directory: backend
        run: |
          npm ci
          npm run typecheck --if-present
          npm run lint --if-present
          npm test --if-present

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend project
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/package.json yet — nothing to build."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and verify
        if: steps.detect.outputs.exists == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck --if-present
          npm run lint --if-present
          npm run build --if-present
